mode: ContinuousDelivery

branches:
  main:
    regex: ^main$
    increment: Patch
    is-main-branch: true

  master:
    regex: ^master$
    increment: Patch
    is-main-branch: true

  feature:
    regex: ^feature?[/-]
    increment: Minor
    source-branches:
      - main


  pull-request:
    regex: ^(pull|pull\-requests|pr)[/-]
    increment: Inherit
