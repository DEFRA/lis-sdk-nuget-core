name: "Pull Request"

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: ["*"]
  push:
    branches: ["main"]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}
  
permissions:
  contents: write
  id-token: write

jobs:
  get-version:
    name: "Calculate Version"
    uses: ./.github/workflows/version.yml
    with:
      ref: ${{ github.head_ref || github.ref_name }}

  create-tag:
    name: "Create Git Tag"
    needs: get-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0
          fetch-tags: true

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Create and push tag
        uses: cake-build/cake-action@v3
        env:
          ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
        with:
          script-path: ./tag.cake
          target: CreateTag
          arguments: |
            tag_version: ${{ needs.get-version.outputs.version }}

  build-pack:
    name: "Build, Test and Pack"
    needs: get-version
    uses: ./.github/workflows/build-pack.yml
    with:
      version: ${{ needs.get-version.outputs.version }}
      ref: ${{ github.head_ref || github.ref_name }}

  sonar-analysis:
    name: "Sonar Analysis"
    needs: [get-version, build-pack]
    uses: ./.github/workflows/sonar.yml
    with:
      version: ${{ needs.get-version.outputs.version }}
      ref: ${{ github.head_ref || github.ref_name }}
    secrets: inherit

  publish-nuget:
    name: "Publish to NuGet"
    needs: [get-version, build-pack, sonar-analysis, create-tag]
    if: needs.sonar-analysis.outputs.quality-gate-status == 'PASSED'
    uses: ./.github/workflows/publish.yml
    with:
      version: ${{ needs.get-version.outputs.version }}
    secrets: inherit

  create-release:
    name: "Create GitHub Release"
    needs: [get-version, create-tag, sonar-analysis, publish-nuget]
    if: needs.sonar-analysis.outputs.quality-gate-status == 'PASSED'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.get-version.outputs.version }}
          name: "v${{ needs.get-version.outputs.version }}"
          generate_release_notes: true
