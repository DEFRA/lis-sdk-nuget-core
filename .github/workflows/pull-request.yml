name: "Pull Request"

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - ["*"]
  push:
    branches: ["main"]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}
  
permissions:
  contents: read
  id-token: write

jobs:
  get-version:
    name: "Calculate Version"
    uses: ./.github/workflows/version.yml
    with:
      ref: ${{ github.head_ref }}

  build-pack:
    name: "Build, Test and Pack"
    needs: get-version
    uses: ./.github/workflows/build-pack.yml
    with:
      version: ${{ needs.get-version.outputs.version }}
      ref: ${{ github.head_ref }}

  sonar-analysis:
    name: "Sonar Analysis"
    needs: [get-version, build-pack]
    uses: ./.github/workflows/sonar.yml
    with:
      version: ${{ needs.get-version.outputs.version }}
      ref: ${{ github.head_ref }}
    secrets: inherit

  publish-nuget:
    name: "Publish to NuGet"
    needs: [get-version, build-pack, sonar-analysis]
    if: needs.sonar-analysis.outputs.quality-gate-status == 'PASSED'
    uses: ./.github/workflows/publish.yml
    with:
      version: ${{ needs.get-version.outputs.version }}
    secrets: inherit
