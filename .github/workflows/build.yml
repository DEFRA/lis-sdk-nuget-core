name: "Build"

on:
  push:
    branches:
      - feature/LREG-*
      - hotfix/LREG-*

permissions:
  contents: read

jobs:
  dotnet-build:
    name: "Build and Pack"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Calculate Version
        id: calculate_version
        uses: cake-build/cake-action@v3
        with:
          script-path: ./build/version.cake
          target: GetVersion

      - name: Store version
        run: |
          mkdir -p .artifacts
          echo "${{ steps.calculate_version.outputs.version }}" > .artifacts/version.txt

      - name: Build and package
        uses: cake-build/cake-action@v3
        with:
          script-path: ./build/build.cake
          args: |
            --target=Pack
            --product_name=Defra.Core
            --solution_file_name=Core.slnx
            --package_version=${{ steps.calculate_version.outputs.version }}

      - name: Upload NuGet package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: .artifacts/*.nupkg
          if-no-files-found: error

      - name: Upload version artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-version
          path: .artifacts/version.txt
          if-no-files-found: error