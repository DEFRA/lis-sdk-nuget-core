name: "Publish GitHub NuGet"

on:
  workflow_run:
    workflows:
      - "Test and Sonar"
    types:
      - completed

permissions:
  contents: read
  packages: write
  actions: read

jobs:
  download-artifacts:
    name: "Download Artifacts"
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    outputs:
      run_id: ${{ steps.build_run.outputs.run_id }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Find successful Build workflow run
        id: build_run
        uses: actions/github-script@v7
        env:
          ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
        with:
          script: |
            const sha = context.payload.workflow_run.head_sha;

            const runs = await github.paginate(
              github.rest.actions.listWorkflowRunsForRepo,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                head_sha: sha,
                status: "completed"
              }
            );

            const buildRun = runs.find(run =>
              run.name === "Build" &&
              run.head_sha === sha &&
              run.conclusion === "success"
            );

            if (!buildRun) {
              core.setFailed(`Could not find a successful Build workflow run for ${sha}.`);
              return;
            }

            core.setOutput("run_id", buildRun.id);

      - name: Download version artifact
        uses: actions/download-artifact@v4
        with:
          name: build-version
          path: artifacts
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.build_run.outputs.run_id }}

      - name: Read version
        id: version
        run: |
          VERSION="$(cat artifacts/version.txt)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Using version: $VERSION"

  publish-nuget:
    name: "Publish NuGet"
    needs: download-artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Download NuGet package artifact
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: artifacts
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ needs.download-artifacts.outputs.run_id }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Debug artifacts
        run: |
          ls -R artifacts || echo "artifacts not found"
          find . -name "*.nupkg"

      - name: Publish package to GitHub Packages
        run: |
          dotnet nuget push "artifacts/*.nupkg" \
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --api-key "${{ secrets.GITHUB_TOKEN }}" \
            --skip-duplicate