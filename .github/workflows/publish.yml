name: "Publish GitHub NuGet"

on:
  workflow_run:
    workflows:
      - "Build"
    types:
      - completed

permissions:
  contents: read
  packages: write
  actions: read

jobs:
  download-artifacts:
    name: "Download Artifacts"
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      contains(github.event.workflow_run.name, 'Build')
    outputs:
      run_id: ${{ steps.build_run.outputs.run_id }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Find successful Build workflow run
        id: build_run
        run: |
          echo "run_id=${{ github.event.workflow_run.id }}" >> "$GITHUB_OUTPUT"

      - name: Download version artifact
        uses: actions/download-artifact@v4
        with:
          name: build-version
          path: artifacts
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.build_run.outputs.run_id }}

      - name: Read version
        id: version
        run: |
          VERSION="$(cat artifacts/version.txt)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Using version: $VERSION"

  publish-nuget:
    name: "Publish NuGet"
    needs: download-artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Download NuGet packages
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: artifacts
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ needs.download-artifacts.outputs.run_id }}

      - name: NuGet login
        id: login
        uses: NuGet/login-action@v1
        with:
          user: ${{ secrets.NUGET_USERNAME }}
          password: ${{ secrets.NUGET_API_KEY }}

      - name: Push to NuGet.org
        run: dotnet nuget push "artifacts/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate