name: "Publish GitHub NuGet"

on:
  workflow_run:
    workflows:
      - "Test and Sonar"
    types:
      - completed

permissions:
  contents: read
  packages: write
  actions: read

jobs:
  publish:
    name: "Publish NuGet package"
    runs-on: ubuntu-latest

    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'

    steps:
      - name: Find successful Build workflow run
        id: build_run
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.workflow_run.head_sha;

            const runs = await github.paginate(
              github.rest.actions.listWorkflowRunsForRepo,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                head_sha: sha,
                status: "completed"
              }
            );

            const buildRun = runs.find(run =>
              run.name === "Build" &&
              run.head_sha === sha &&
              run.conclusion === "success"
            );

            if (!buildRun) {
              core.setFailed(`Could not find a successful Build workflow run for ${sha}.`);
              return;
            }

            core.setOutput("run_id", buildRun.id);

      - name: Download NuGet package artifact
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: .artifacts
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.build_run.outputs.run_id }}

      - name: Download version artifact
        uses: actions/download-artifact@v4
        with:
          name: build-version
          path: .artifacts
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.build_run.outputs.run_id }}

      - name: Read version
        id: version
        run: |
          VERSION="$(cat .artifacts/version.txt)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish package to GitHub Packages
        run: |
          dotnet nuget push ".artifacts/*.nupkg" \
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --api-key "${{ secrets.GITHUB_TOKEN }}" \
            --skip-duplicate